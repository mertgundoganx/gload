name: main PR guard

# Pull requests into main may only originate from the development branch.
# Make the "from-development" check a required status check on main so any PR
# from another branch is blocked from merging.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  from-development:
    runs-on: ubuntu-latest
    steps:
      - name: Require the PR to come from this repo's development branch
        if: >-
          github.head_ref != 'development' ||
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Pull requests into main must come from the 'development' branch of this repository (a fork or another branch is not allowed)."
          exit 1
